<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timmetraq Tracker</title>
    <style>
      :root {
        --orange: #f26522;
        --orange-hover: #e05a1c;
        --orange-focus: rgba(242, 101, 34, 0.2);
        --heading: #1a202c;
        --text: #2d3748;
        --label: #718096;
        --placeholder: #a0aec0;
        --border: #e2e8f0;
        --bg-page: #f4f4f5;
        --card: #ffffff;
        --err: #e53e3e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        font-size: 15px;
        color: var(--text);
        background: var(--bg-page);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 400px;
        background: var(--card);
        border-radius: 20px;
        padding: 40px 36px 32px;
        box-shadow: 0 4px 24px rgba(26, 32, 44, 0.08);
      }

      .brand {
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }

      .brand img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        border-radius: 14px;
      }

      .headline {
        text-align: center;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.375rem;
        font-weight: 700;
        color: var(--heading);
        letter-spacing: -0.02em;
        line-height: 1.25;
      }

      .subtitle {
        margin: 0;
        font-size: 0.9375rem;
        color: var(--label);
        line-height: 1.5;
      }

      label {
        display: block;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--label);
        margin-bottom: 8px;
      }

      .field {
        margin-bottom: 18px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font: inherit;
        font-size: 0.9375rem;
        color: var(--heading);
        background: #fff;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input::placeholder {
        color: var(--placeholder);
        font-weight: 400;
      }

      input:focus {
        outline: none;
        border-color: var(--orange);
        box-shadow: 0 0 0 3px var(--orange-focus);
      }

      .err {
        margin: -4px 0 14px;
        min-height: 0;
        font-size: 0.8125rem;
        color: var(--err);
        line-height: 1.4;
      }

      .err:empty {
        display: none;
      }

      button[type="submit"] {
        width: 100%;
        margin-top: 4px;
        padding: 13px 18px;
        border: none;
        border-radius: 8px;
        font: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #fff;
        background: var(--orange);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: background 0.15s;
      }

      button[type="submit"]:hover:not(:disabled) {
        background: var(--orange-hover);
      }

      button[type="submit"]:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      button[type="submit"] svg {
        flex-shrink: 0;
      }

      .footer {
        margin-top: 24px;
        font-size: 0.8125rem;
        color: var(--placeholder);
        text-align: center;
        line-height: 1.55;
      }

      .footer strong {
        color: var(--label);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <img src="logo.png" width="64" height="64" alt="Timmetraq Tracker" />
      </div>

      <div class="headline">
        <h1>Timmetraq Tracker</h1>
        <p class="subtitle">Log in met je Timmetraq-account om Timmetraq Tracker te koppelen.</p>
      </div>

      <form id="form">
        <div class="field">
          <label for="email">E-mailadres</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="naam@voorbeeld.nl"
            required
          />
        </div>
        <div class="field">
          <label for="password">Wachtwoord</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>
        <p class="err" id="err" role="alert"></p>
        <button type="submit" id="btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Inloggen
        </button>
      </form>
    </div>
    <script>
      var form = document.getElementById('form');
      var err = document.getElementById('err');
      var btn = document.getElementById('btn');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        err.textContent = '';
        btn.disabled = true;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var res = await window.om.login(email, password);
        if (res.ok) {
          window.close();
        } else {
          err.textContent = res.error || 'Inloggen mislukt';
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
